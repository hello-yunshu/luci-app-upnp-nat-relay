name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
      release: ${{ steps.check.outputs.release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: check
        run: |
          PKG_VERSION=$(grep '^PKG_VERSION:=' package/upnp-bridge-relay/Makefile | cut -d= -f2)
          PKG_RELEASE=$(grep '^PKG_RELEASE:=' package/upnp-bridge-relay/Makefile | cut -d= -f2)
          TAG="v${PKG_VERSION}-${PKG_RELEASE}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger, proceeding with build"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
            echo "release=${PKG_RELEASE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git tag -l "$TAG" | grep -q .; then
            echo "Tag ${TAG} already exists, skipping"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "New version detected: ${TAG}"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release=${PKG_RELEASE}" >> "$GITHUB_OUTPUT"

  build:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build packages
        run: |
          set -euo pipefail

          sudo apt-get update -qq
          sudo apt-get install -qq -y binutils

          PKG_VERSION="${{ needs.check-version.outputs.version }}"
          PKG_RELEASE="${{ needs.check-version.outputs.release }}"

          WORKDIR="/tmp/build-pkg"
          rm -rf "${WORKDIR}"
          mkdir -p "${WORKDIR}"

          build_ipk() (
            local pkg_name="$1" pkg_version="$2" pkg_release="$3" pkg_arch="$4"
            local pkg_maintainer="$5" pkg_desc="$6" pkg_depends="$7"
            local src_dir="$8" conffiles="$9" postinst="${10:-}" prerm="${11:-}"

            local pkg_dir="${WORKDIR}/ipk/${pkg_name}"
            local full_version="${pkg_version}-${pkg_release}"
            local ipk_filename="${pkg_name}_${full_version}_${pkg_arch}.ipk"

            echo "Building ${ipk_filename}..."

            mkdir -p "${pkg_dir}/data" "${pkg_dir}/control"
            cp -a "${src_dir}"/* "${pkg_dir}/data/" 2>/dev/null || true

            cat > "${pkg_dir}/control/control" << EOF
          Package: ${pkg_name}
          Version: ${full_version}
          Depends: ${pkg_depends}
          Source: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}
          Section: net
          Architecture: ${pkg_arch}
          Maintainer: ${pkg_maintainer}
          Description: ${pkg_desc}
          EOF

            if [ -n "${conffiles}" ]; then
              printf '%s\n' ${conffiles} > "${pkg_dir}/control/conffiles"
            fi

            if [ -n "${postinst}" ]; then
              printf '#!/bin/sh\n%s\n' "${postinst}" > "${pkg_dir}/control/postinst"
              chmod 0755 "${pkg_dir}/control/postinst"
            fi

            if [ -n "${prerm}" ]; then
              printf '#!/bin/sh\n%s\n' "${prerm}" > "${pkg_dir}/control/prerm"
              chmod 0755 "${pkg_dir}/control/prerm"
            fi

            cd "${pkg_dir}/data"
            tar czf "${pkg_dir}/data.tar.gz" --owner=0 --group=0 .
            cd "${pkg_dir}/control"
            tar czf "${pkg_dir}/control.tar.gz" --owner=0 --group=0 .
            echo "2.0" > "${pkg_dir}/debian-binary"

            cd "${pkg_dir}"
            ar r "${WORKDIR}/${ipk_filename}" debian-binary control.tar.gz data.tar.gz
            echo "Built: ${ipk_filename}"
          )

          build_apk() (
            local pkg_name="$1" pkg_version="$2" pkg_release="$3" pkg_arch="$4"
            local pkg_maintainer="$5" pkg_desc="$6" pkg_depends="$7"
            local src_dir="$8" postinst="${9:-}" prerm="${10:-}"

            local pkg_dir="${WORKDIR}/apk/${pkg_name}"
            local full_version="${pkg_version}-r${pkg_release}"
            local apk_filename="${pkg_name}_${full_version}_${pkg_arch}.apk"

            echo "Building ${apk_filename}..."

            mkdir -p "${pkg_dir}/data" "${pkg_dir}/control"
            cp -a "${src_dir}"/* "${pkg_dir}/data/" 2>/dev/null || true

            cd "${pkg_dir}/data"
            tar czf "${pkg_dir}/data.tar.gz" --owner=0 --group=0 .
            local datahash=$(sha256sum "${pkg_dir}/data.tar.gz" | cut -d' ' -f1)
            local data_size=$(du -sb . | cut -f1)

            cat > "${pkg_dir}/control/.PKGINFO" << EOF
          pkgname = ${pkg_name}
          pkgver = ${full_version}
          pkgdesc = ${pkg_desc}
          url = ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}
          builddate = $(date +%s)
          packager = ${pkg_maintainer}
          size = ${data_size}
          arch = ${pkg_arch}
          origin = ${pkg_name}
          license = GPL-3.0-only
          datahash = ${datahash}
          EOF

            for dep in ${pkg_depends//,/ }; do
              dep=$(echo "$dep" | xargs)
              [ -n "$dep" ] && echo "depend = ${dep}" >> "${pkg_dir}/control/.PKGINFO"
            done

            if [ -n "${postinst}" ]; then
              printf '#!/bin/sh\n%s\nexit 0\n' "${postinst}" > "${pkg_dir}/control/.post-install"
              chmod 0755 "${pkg_dir}/control/.post-install"
            fi

            if [ -n "${prerm}" ]; then
              printf '#!/bin/sh\n%s\nexit 0\n' "${prerm}" > "${pkg_dir}/control/.pre-deinstall"
              chmod 0755 "${pkg_dir}/control/.pre-deinstall"
            fi

            cd "${pkg_dir}/control"
            tar czf "${pkg_dir}/control.tar.gz" --owner=0 --group=0 --transform='s,^\./,,' .

            cat "${pkg_dir}/control.tar.gz" "${pkg_dir}/data.tar.gz" > "${WORKDIR}/${apk_filename}"
            echo "Built: ${apk_filename}"
          )

          POSTINST_UPNP_IPK='[ -n "${IPKG_NO_SCRIPT}" ] && exit 0
          [ -x /etc/init.d/upnp_bridge_relay ] && /etc/init.d/upnp_bridge_relay enable 2>/dev/null'

          PRERM_UPNP_IPK='[ -n "${IPKG_NO_SCRIPT}" ] && exit 0
          /etc/init.d/upnp_bridge_relay stop 2>/dev/null
          /etc/init.d/upnp_bridge_relay disable 2>/dev/null'

          POSTINST_UPNP_APK='[ -x /etc/init.d/upnp_bridge_relay ] && /etc/init.d/upnp_bridge_relay enable 2>/dev/null || true'

          PRERM_UPNP_APK='/etc/init.d/upnp_bridge_relay stop 2>/dev/null || true
          /etc/init.d/upnp_bridge_relay disable 2>/dev/null || true'

          build_ipk \
            "upnp-bridge-relay" "${PKG_VERSION}" "${PKG_RELEASE}" "all" \
            "yunshu" \
            "UPnP Bridge Relay - Bridge downstream UPnP mappings through upstream NAT" \
            "libc, miniupnpc, nftables, uci, ubus, rpcd" \
            "package/upnp-bridge-relay/files" \
            "/etc/config/upnp_bridge_relay" \
            "${POSTINST_UPNP_IPK}" "${PRERM_UPNP_IPK}"

          build_apk \
            "upnp-bridge-relay" "${PKG_VERSION}" "${PKG_RELEASE}" "all" \
            "yunshu" \
            "UPnP Bridge Relay - Bridge downstream UPnP mappings through upstream NAT" \
            "libc, miniupnpc, nftables, uci, ubus, rpcd" \
            "package/upnp-bridge-relay/files" \
            "${POSTINST_UPNP_APK}" "${PRERM_UPNP_APK}"

          LUCI_DIR="${WORKDIR}/luci-app-data"
          mkdir -p "${LUCI_DIR}"
          cp -a luci-app-upnp-bridge-relay/htdocs "${LUCI_DIR}/"
          cp -a luci-app-upnp-bridge-relay/root "${LUCI_DIR}/"

          build_ipk \
            "luci-app-upnp-bridge-relay" "${PKG_VERSION}" "${PKG_RELEASE}" "all" \
            "yunshu" \
            "LuCI support for UPnP Bridge Relay" \
            "libc, upnp-bridge-relay, luci-base" \
            "${LUCI_DIR}" "" "" ""

          build_apk \
            "luci-app-upnp-bridge-relay" "${PKG_VERSION}" "${PKG_RELEASE}" "all" \
            "yunshu" \
            "LuCI support for UPnP Bridge Relay" \
            "libc, upnp-bridge-relay, luci-base" \
            "${LUCI_DIR}" "" ""

          for lang_dir in luci-app-upnp-bridge-relay/po/*/; do
            [ -d "${lang_dir}" ] || continue
            lang=$(basename "${lang_dir}")
            [ "${lang}" = "templates" ] && continue
            [ -f "${lang_dir}/upnp-bridge-relay.po" ] || continue

            echo "Building i18n package for ${lang}..."

            I18N_DATA="${WORKDIR}/luci-i18n-${lang}-data"
            mkdir -p "${I18N_DATA}/usr/lib/lua/luci/i18n"
            python3 luci-app-upnp-bridge-relay/po/po2lmo.py \
              "${lang_dir}/upnp-bridge-relay.po" \
              "${I18N_DATA}/usr/lib/lua/luci/i18n/upnp-bridge-relay.${lang}.lmo"

            build_ipk \
              "luci-i18n-upnp-bridge-relay-${lang}" "${PKG_VERSION}" "${PKG_RELEASE}" "all" \
              "yunshu" \
              "Translation (${lang}) for luci-app-upnp-bridge-relay" \
              "libc, luci-app-upnp-bridge-relay, luci-i18n-base-${lang}" \
              "${I18N_DATA}" "" "" ""

            build_apk \
              "luci-i18n-upnp-bridge-relay-${lang}" "${PKG_VERSION}" "${PKG_RELEASE}" "all" \
              "yunshu" \
              "Translation (${lang}) for luci-app-upnp-bridge-relay" \
              "libc, luci-app-upnp-bridge-relay, luci-i18n-base-${lang}" \
              "${I18N_DATA}" "" ""
          done

          mkdir -p release
          cp "${WORKDIR}"/*.ipk "${WORKDIR}"/*.apk release/

      - name: Verify build artifacts
        working-directory: release
        run: |
          for fmt in ipk apk; do
            expected="upnp-bridge-relay luci-app-upnp-bridge-relay"
            for pkg in $expected; do
              if ! ls ${pkg}_*.${fmt} 1>/dev/null 2>&1; then
                echo "ERROR: Expected package ${pkg}_*.${fmt} not found"
                exit 1
              fi
            done

            i18n_count=$(ls luci-i18n-upnp-bridge-relay-*.${fmt} 2>/dev/null | wc -l)
            if [ "${i18n_count}" -eq 0 ]; then
              echo "WARNING: No i18n ${fmt} packages found"
            else
              echo "Found ${i18n_count} i18n ${fmt} package(s)"
            fi
          done

          echo "All expected packages found:"
          ls -la *.ipk *.apk

          echo ""
          echo "=== APK structure verification ==="
          for apk_file in upnp-bridge-relay_*.apk; do
            echo "Checking ${apk_file}..."
            listing=$(tar tzf "${apk_file}" 2>/dev/null)
            if echo "${listing}" | grep -q '\.PKGINFO'; then
              echo "  .PKGINFO: OK"
            else
              echo "  ERROR: .PKGINFO not found in control section"
              exit 1
            fi
            if echo "${listing}" | grep -q '\.post-install'; then
              echo "  .post-install: OK"
            else
              echo "  .post-install: not present (OK for packages without scripts)"
            fi
            if echo "${listing}" | grep -q '\.pre-deinstall'; then
              echo "  .pre-deinstall: OK"
            else
              echo "  .pre-deinstall: not present (OK for packages without scripts)"
            fi
          done

          for apk_file in luci-app-upnp-bridge-relay_*.apk luci-i18n-*.apk; do
            [ -f "${apk_file}" ] || continue
            echo "Checking ${apk_file}..."
            listing=$(tar tzf "${apk_file}" 2>/dev/null)
            if echo "${listing}" | grep -q '\.PKGINFO'; then
              echo "  .PKGINFO: OK"
            else
              echo "  ERROR: .PKGINFO not found in control section"
              exit 1
            fi
          done

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum *.ipk *.apk > sha256sums.txt
          cat sha256sums.txt

      - name: Delete existing release (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.release }}"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.release }}
          name: v${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.release }}
          body: |
            UPnP Bridge Relay v${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.release }}

            ## Packages
            - `upnp-bridge-relay` - Main service package
            - `luci-app-upnp-bridge-relay` - LuCI web interface
            - `luci-i18n-upnp-bridge-relay-*` - Language packs

            Both `.ipk` (opkg) and `.apk` (apk) formats are provided.

            ## Installation (opkg - OpenWrt 23.05 / 24.10)
            ```bash
            opkg install upnp-bridge-relay_*.ipk
            opkg install luci-app-upnp-bridge-relay_*.ipk
            opkg install luci-i18n-upnp-bridge-relay-zh_Hans_*.ipk
            ```

            ## Installation (apk - OpenWrt 25.12+)
            ```bash
            apk add --allow-untrusted ./upnp-bridge-relay_*.apk
            apk add --allow-untrusted ./luci-app-upnp-bridge-relay_*.apk
            apk add --allow-untrusted ./luci-i18n-upnp-bridge-relay-zh_Hans_*.apk
            ```

            ## Upgrade
            ```bash
            # Download new package files from Release, then install the same way as above.
            # opkg/apk will automatically detect and upgrade the existing version.
            # Your UCI config (/etc/config/upnp_bridge_relay) is preserved.

            # Clear LuCI cache after upgrade:
            rm -rf /tmp/luci-*
            # Then force-refresh browser: Ctrl+Shift+R
            ```

            ## Requirements
            - OpenWrt 23.05+ with fw4/nftables
            - miniupnpc, nftables installed
          files: |
            release/upnp-bridge-relay_*.ipk
            release/luci-app-upnp-bridge-relay_*.ipk
            release/luci-i18n-upnp-bridge-relay-*.ipk
            release/upnp-bridge-relay_*.apk
            release/luci-app-upnp-bridge-relay_*.apk
            release/luci-i18n-upnp-bridge-relay-*.apk

      - name: Upload checksums
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.release }}
          files: |
            release/sha256sums.txt
